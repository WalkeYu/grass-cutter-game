<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Grass Cutter</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8ffe8;
      --muted: #b8c8b8;
      --night: #06140c;
      --panel: #0b2113;
      --panel-2: #12331d;
      --lime: #c8ff55;
      --green: #21d76d;
      --orange: #ffb84d;
      --red: #ff6f61;
      --line: rgba(200, 255, 85, 0.28);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      font-family: "Trebuchet MS", "Avenir Next", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--night);
    }

    body {
      min-width: 280px;
      color: var(--ink);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    button {
      min-height: 44px;
      padding: 11px 17px;
      color: var(--night);
      background: var(--lime);
      border: 1px solid var(--lime);
      border-radius: 8px;
      cursor: pointer;
      font: 900 0.78rem/1 "Trebuchet MS", sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    button:hover:not(:disabled) {
      background: #dcff95;
      box-shadow: 0 6px 22px rgba(200, 255, 85, 0.25);
      transform: translateY(-2px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.secondary {
      color: var(--ink);
      background: transparent;
      border-color: rgba(248, 255, 232, 0.28);
    }

    button.secondary:hover:not(:disabled) {
      color: var(--lime);
      background: rgba(200, 255, 85, 0.08);
    }

    :focus-visible {
      outline: 3px solid var(--orange);
      outline-offset: 3px;
    }

    .game-shell {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 280px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -20%, rgba(49, 216, 107, 0.3), transparent 50%),
        var(--night);
      isolation: isolate;
    }

    #game-canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .hud {
      position: absolute;
      z-index: 4;
      top: max(10px, env(safe-area-inset-top));
      left: 50%;
      display: grid;
      grid-template-columns: minmax(88px, 1fr) auto minmax(88px, 1fr) auto;
      gap: 9px;
      align-items: center;
      width: min(720px, calc(100% - 24px));
      pointer-events: none;
      transform: translateX(-50%);
    }

    .score-card,
    .timer,
    .feed {
      min-height: 44px;
      padding: 8px 11px;
      background: rgba(5, 19, 11, 0.88);
      border: 1px solid rgba(248, 255, 232, 0.16);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(6px);
    }

    .score-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .score-name,
    .score-value,
    .timer,
    .feed {
      font-size: 0.67rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .score-name.player {
      color: var(--lime);
    }

    .score-name.rival {
      color: var(--orange);
    }

    .meter {
      height: 7px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    .meter > span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--lime);
      border-radius: inherit;
      transition: width 120ms linear;
    }

    .rival-meter > span {
      background: var(--orange);
    }

    .timer,
    .feed {
      display: grid;
      place-items: center;
      white-space: nowrap;
    }

    .timer {
      min-width: 58px;
      color: var(--ink);
    }

    .feed {
      min-width: 72px;
      color: var(--lime);
    }

    .control-hint {
      position: absolute;
      z-index: 3;
      bottom: max(10px, env(safe-area-inset-bottom));
      left: 50%;
      margin: 0;
      padding: 7px 12px;
      color: var(--muted);
      background: rgba(5, 19, 11, 0.82);
      border: 1px solid rgba(248, 255, 232, 0.12);
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .overlay {
      position: absolute;
      z-index: 8;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 13, 7, 0.76);
      backdrop-filter: blur(10px);
      overflow: auto;
    }

    .overlay[hidden] {
      display: none;
    }

    .panel {
      width: min(620px, 100%);
      max-height: calc(100% - 2px);
      padding: clamp(18px, 4vh, 34px);
      overflow: auto;
      background:
        linear-gradient(145deg, rgba(200, 255, 85, 0.08), transparent 42%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow), 10px 10px 0 rgba(200, 255, 85, 0.05);
      text-align: center;
    }

    .kicker {
      margin: 0 0 7px;
      color: var(--lime);
      font-size: 0.69rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 950;
      letter-spacing: -0.045em;
      line-height: 0.94;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 6vh, 3.5rem);
    }

    h2 {
      font-size: clamp(1.8rem, 5vh, 3rem);
    }

    .lede {
      max-width: 500px;
      margin: 12px auto 17px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .draw-wrap {
      position: relative;
      margin: 0 auto 13px;
      overflow: hidden;
      background: #07180e;
      border: 1px solid rgba(200, 255, 85, 0.34);
      border-radius: 10px;
    }

    #blade-pad {
      display: block;
      width: 100%;
      height: clamp(96px, 21vh, 170px);
      cursor: crosshair;
      touch-action: none;
    }

    .draw-label {
      position: absolute;
      top: 8px;
      left: 10px;
      padding: 4px 7px;
      color: var(--muted);
      background: rgba(3, 13, 7, 0.78);
      border-radius: 4px;
      font-size: 0.61rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .actions button {
      min-width: 132px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .result-card {
      padding: 14px;
      background: rgba(5, 19, 11, 0.7);
      border: 1px solid rgba(248, 255, 232, 0.14);
      border-radius: 9px;
    }

    .result-card span,
    .result-card strong {
      display: block;
    }

    .result-card span {
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result-card strong {
      margin-top: 5px;
      color: var(--lime);
      font-size: 1.55rem;
    }

    .pet-message {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .pet-message strong {
      color: var(--ink);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 620px) {
      .hud {
        grid-template-columns: minmax(74px, 1fr) auto minmax(74px, 1fr);
      }

      .feed {
        position: absolute;
        top: 50px;
        left: 50%;
        min-height: 32px;
        transform: translateX(-50%);
      }

      .score-card {
        grid-template-columns: 1fr auto;
      }

      .score-card .meter {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .control-hint {
        max-width: calc(100% - 20px);
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-height: 440px) {
      .overlay {
        padding: 7px;
      }

      .panel {
        padding: 11px 13px;
      }

      .kicker {
        margin-bottom: 3px;
        font-size: 0.58rem;
      }

      h1,
      h2 {
        font-size: 1.35rem;
      }

      .lede {
        margin: 5px auto 7px;
        font-size: 0.69rem;
        line-height: 1.25;
      }

      #blade-pad {
        height: 72px;
      }

      .draw-wrap {
        margin-bottom: 7px;
      }

      .actions button {
        min-width: 112px;
        min-height: 40px;
        padding: 8px 12px;
        font-size: 0.66rem;
      }

      .result-grid {
        margin: 8px 0;
      }

      .result-card {
        padding: 7px;
      }

      .result-card strong {
        font-size: 1.1rem;
      }

      .pet-message {
        margin-bottom: 8px;
        font-size: 0.7rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" id="game-shell">
    <canvas id="game-canvas" tabindex="0" role="application" aria-label="Grass Cutter race. Steer with the pointer, touch, arrow keys, or A and D keys."></canvas>

    <div class="hud" aria-label="Race status">
      <div class="score-card">
        <span class="score-name player">You</span>
        <span class="meter"><span id="player-meter"></span></span>
        <span class="score-value" id="player-score">0%</span>
      </div>
      <div class="timer" id="timer">24s</div>
      <div class="score-card">
        <span class="score-name rival">Rival</span>
        <span class="meter rival-meter"><span id="rival-meter"></span></span>
        <span class="score-value" id="rival-score">0%</span>
      </div>
      <div class="feed" id="feed">🐾 0</div>
    </div>

    <p class="control-hint" id="control-hint">Drag across your lane or use ← → / A D to steer</p>

    <section class="overlay" id="design-overlay" aria-labelledby="game-title">
      <div class="panel">
        <p class="kicker">Blade workshop</p>
        <h1 id="game-title">Grass Cutter</h1>
        <p class="lede">Draw a line below. It becomes your spinning mower blade when the race begins.</p>
        <div class="draw-wrap">
          <canvas id="blade-pad" width="560" height="180" aria-label="Blade drawing area"></canvas>
          <span class="draw-label">Draw your blade</span>
        </div>
        <div class="actions">
          <button class="secondary" id="clear-blade" type="button">Clear Blade</button>
          <button id="start-race" type="button">Start Race</button>
        </div>
      </div>
    </section>

    <section class="overlay" id="result-overlay" aria-labelledby="result-title" hidden>
      <div class="panel" aria-live="polite">
        <p class="kicker" id="result-kicker">Race complete</p>
        <h2 id="result-title">Lawn Cleared</h2>
        <div class="result-grid">
          <div class="result-card"><span>Your lawn</span><strong id="result-player">0%</strong></div>
          <div class="result-card"><span>Rival lawn</span><strong id="result-rival">0%</strong></div>
        </div>
        <p class="pet-message" id="pet-message"><strong>🐶 Your pet is waiting.</strong></p>
        <div class="actions">
          <button class="secondary" id="new-blade" type="button">Draw New Blade</button>
          <button id="race-again" type="button">Race Again</button>
        </div>
      </div>
    </section>

    <p class="sr-only" id="race-announcement" aria-live="polite"></p>
  </main>

  <script>
    (() => {
      "use strict";

      const shell = document.getElementById("game-shell");
      const canvas = document.getElementById("game-canvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const pad = document.getElementById("blade-pad");
      const padCtx = pad.getContext("2d");
      const designOverlay = document.getElementById("design-overlay");
      const resultOverlay = document.getElementById("result-overlay");
      const startButton = document.getElementById("start-race");
      const clearButton = document.getElementById("clear-blade");
      const againButton = document.getElementById("race-again");
      const newBladeButton = document.getElementById("new-blade");
      const playerMeter = document.getElementById("player-meter");
      const rivalMeter = document.getElementById("rival-meter");
      const playerScoreText = document.getElementById("player-score");
      const rivalScoreText = document.getElementById("rival-score");
      const timerText = document.getElementById("timer");
      const feedText = document.getElementById("feed");
      const resultTitle = document.getElementById("result-title");
      const resultKicker = document.getElementById("result-kicker");
      const resultPlayer = document.getElementById("result-player");
      const resultRival = document.getElementById("result-rival");
      const petMessage = document.getElementById("pet-message");
      const announcement = document.getElementById("race-announcement");

      const RACE_SECONDS = 24;
      const COLS = 9;
      const ROWS = 18;
      const rivalBlade = [
        { x: -0.95, y: 0.05 },
        { x: -0.38, y: -0.34 },
        { x: 0.12, y: 0.28 },
        { x: 0.95, y: -0.08 }
      ];

      let width = 0;
      let height = 0;
      let dpr = 1;
      let layout = null;
      let phase = "design";
      let bladePoints = [];
      let drawing = false;
      let drawingPointer = null;
      let playerCells = [];
      let rivalCells = [];
      let particles = [];
      let raceElapsed = 0;
      let lastTime = performance.now();
      let playerProgress = 0;
      let rivalProgress = 0;
      let playerX = 0.5;
      let playerTargetX = 0.5;
      let rivalX = 0.5;
      let playerScore = 0;
      let rivalScore = 0;
      let bladeAngle = 0;
      let pointerActive = false;
      let activePointer = null;
      const keys = new Set();
      let feed = readFeed();

      function readFeed() {
        try {
          return Math.max(0, Number.parseInt(localStorage.getItem("grass-cutter-feed") || "0", 10) || 0);
        } catch (error) {
          return 0;
        }
      }

      function saveFeed() {
        try {
          localStorage.setItem("grass-cutter-feed", String(feed));
        } catch (error) {
          // The game remains fully playable when storage is unavailable.
        }
      }

      function clamp(value, minimum, maximum) {
        return Math.max(minimum, Math.min(maximum, value));
      }

      function lerp(from, to, amount) {
        return from + (to - from) * amount;
      }

      function roundedRect(context, x, y, w, h, radius) {
        const r = Math.min(radius, w / 2, h / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + w, y, x + w, y + h, r);
        context.arcTo(x + w, y + h, x, y + h, r);
        context.arcTo(x, y + h, x, y, r);
        context.arcTo(x, y, x + w, y, r);
        context.closePath();
      }

      function makeCells() {
        return Array.from({ length: ROWS * COLS }, (_, index) => ({
          column: index % COLS,
          row: Math.floor(index / COLS),
          cut: false,
          shade: (index * 17 + Math.floor(index / COLS) * 11) % 4
        }));
      }

      function buildLayout() {
        const side = clamp(width * 0.025, 9, 26);
        const gap = clamp(width * 0.018, 8, 18);
        const top = height < 420 ? 60 : 68;
        const bottom = height < 420 ? height - 27 : height - 40;
        const laneWidth = (width - side * 2 - gap) / 2;
        return {
          side,
          gap,
          top,
          bottom,
          laneHeight: Math.max(120, bottom - top),
          laneWidth,
          playerLane: { x: side, width: laneWidth },
          rivalLane: { x: side + laneWidth + gap, width: laneWidth }
        };
      }

      function resize() {
        const rect = shell.getBoundingClientRect();
        width = Math.max(280, rect.width);
        height = Math.max(280, rect.height);
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        layout = buildLayout();
        render();
      }

      function drawPadGrid() {
        const w = pad.width;
        const h = pad.height;
        padCtx.clearRect(0, 0, w, h);
        padCtx.fillStyle = "#07180e";
        padCtx.fillRect(0, 0, w, h);
        padCtx.strokeStyle = "rgba(200,255,85,.08)";
        padCtx.lineWidth = 1;
        for (let x = 0; x <= w; x += 28) {
          padCtx.beginPath();
          padCtx.moveTo(x, 0);
          padCtx.lineTo(x, h);
          padCtx.stroke();
        }
        for (let y = 0; y <= h; y += 28) {
          padCtx.beginPath();
          padCtx.moveTo(0, y);
          padCtx.lineTo(w, y);
          padCtx.stroke();
        }
        padCtx.strokeStyle = "rgba(248,255,232,.15)";
        padCtx.setLineDash([6, 7]);
        padCtx.beginPath();
        padCtx.moveTo(w / 2, 16);
        padCtx.lineTo(w / 2, h - 16);
        padCtx.stroke();
        padCtx.setLineDash([]);
      }

      function drawBladeOnPad() {
        drawPadGrid();
        if (bladePoints.length < 2) return;
        padCtx.save();
        padCtx.lineCap = "round";
        padCtx.lineJoin = "round";
        padCtx.shadowColor = "rgba(200,255,85,.65)";
        padCtx.shadowBlur = 12;
        padCtx.strokeStyle = "#c8ff55";
        padCtx.lineWidth = 8;
        padCtx.beginPath();
        padCtx.moveTo(bladePoints[0].x, bladePoints[0].y);
        for (let index = 1; index < bladePoints.length; index += 1) {
          padCtx.lineTo(bladePoints[index].x, bladePoints[index].y);
        }
        padCtx.stroke();
        padCtx.restore();
      }

      function seedBlade() {
        bladePoints = [];
        const count = 28;
        for (let index = 0; index < count; index += 1) {
          const t = index / (count - 1);
          bladePoints.push({
            x: 68 + t * (pad.width - 136),
            y: pad.height * 0.5 + Math.sin(t * Math.PI * 2.2) * pad.height * 0.22
          });
        }
        startButton.disabled = false;
        drawBladeOnPad();
      }

      function padPoint(event) {
        const rect = pad.getBoundingClientRect();
        return {
          x: clamp((event.clientX - rect.left) * pad.width / rect.width, 0, pad.width),
          y: clamp((event.clientY - rect.top) * pad.height / rect.height, 0, pad.height)
        };
      }

      function normalizeBlade() {
        if (bladePoints.length < 2) return [{ x: -1, y: 0 }, { x: 1, y: 0 }];
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;
        bladePoints.forEach((point) => {
          minX = Math.min(minX, point.x);
          maxX = Math.max(maxX, point.x);
          minY = Math.min(minY, point.y);
          maxY = Math.max(maxY, point.y);
        });
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        const scale = Math.max(maxX - minX, maxY - minY, 1) / 2;
        const stride = Math.max(1, Math.floor(bladePoints.length / 24));
        const normalized = bladePoints
          .filter((_, index) => index % stride === 0 || index === bladePoints.length - 1)
          .map((point) => ({
            x: clamp((point.x - centerX) / scale, -1, 1),
            y: clamp((point.y - centerY) / scale, -1, 1)
          }));
        return normalized.length > 1 ? normalized : [{ x: -1, y: 0 }, { x: 1, y: 0 }];
      }

      function resetRace() {
        playerCells = makeCells();
        rivalCells = makeCells();
        particles = [];
        raceElapsed = 0;
        playerProgress = 0;
        rivalProgress = 0;
        playerX = 0.5;
        playerTargetX = 0.5;
        rivalX = 0.5;
        playerScore = 0;
        rivalScore = 0;
        bladeAngle = 0;
        updateHud();
      }

      function startRace() {
        resetRace();
        phase = "racing";
        designOverlay.hidden = true;
        resultOverlay.hidden = true;
        announcement.textContent = "The grass cutting race has started.";
        canvas.focus({ preventScroll: true });
      }

      function showDesigner() {
        phase = "design";
        resultOverlay.hidden = true;
        designOverlay.hidden = false;
        drawBladeOnPad();
        startButton.focus({ preventScroll: true });
      }

      function lanePoint(cell, lane) {
        const cellWidth = lane.width / COLS;
        const cellHeight = layout.laneHeight / ROWS;
        return {
          x: lane.x + (cell.column + 0.5) * cellWidth,
          y: layout.top + (cell.row + 0.5) * cellHeight,
          cellWidth,
          cellHeight
        };
      }

      function mowerPoint(lane, progress, xRatio) {
        return {
          x: lane.x + clamp(xRatio, 0.09, 0.91) * lane.width,
          y: layout.bottom - clamp(progress, 0, 1) * layout.laneHeight
        };
      }

      function transformedBlade(center, points, angle, radius) {
        const cosine = Math.cos(angle);
        const sine = Math.sin(angle);
        return points.map((point) => ({
          x: center.x + (point.x * cosine - point.y * sine) * radius,
          y: center.y + (point.x * sine + point.y * cosine) * radius
        }));
      }

      function pointSegmentDistance(point, start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const lengthSquared = dx * dx + dy * dy;
        if (!lengthSquared) return Math.hypot(point.x - start.x, point.y - start.y);
        const t = clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared, 0, 1);
        return Math.hypot(point.x - (start.x + t * dx), point.y - (start.y + t * dy));
      }

      function cutLane(cells, lane, center, points, angle, isPlayer) {
        const radius = isPlayer
          ? clamp(lane.width * 0.31, 32, 134)
          : clamp(lane.width * 0.13, 22, 58);
        const blade = transformedBlade(center, points, angle, radius);
        let newlyCut = 0;
        cells.forEach((cell) => {
          if (cell.cut) return;
          const position = lanePoint(cell, lane);
          const threshold = Math.max(8, Math.min(position.cellWidth, position.cellHeight) * 0.78);
          let distance = Math.hypot(position.x - center.x, position.y - center.y) - 11;
          for (let index = 1; index < blade.length; index += 1) {
            distance = Math.min(distance, pointSegmentDistance(position, blade[index - 1], blade[index]));
          }
          if (distance <= threshold) {
            cell.cut = true;
            newlyCut += 1;
            if (particles.length < 100 && (isPlayer || Math.random() > 0.55)) {
              particles.push({
                x: position.x,
                y: position.y,
                vx: (Math.random() - 0.5) * 46,
                vy: -22 - Math.random() * 36,
                life: 0.55 + Math.random() * 0.35,
                maxLife: 0.9,
                color: isPlayer ? "#c8ff55" : "#ffb84d"
              });
            }
          }
        });
        return newlyCut;
      }

      function updateHud() {
        const playerPercent = Math.round(playerScore * 100);
        const rivalPercent = Math.round(rivalScore * 100);
        playerMeter.style.width = `${playerPercent}%`;
        rivalMeter.style.width = `${rivalPercent}%`;
        playerScoreText.textContent = `${playerPercent}%`;
        rivalScoreText.textContent = `${rivalPercent}%`;
        timerText.textContent = `${Math.max(0, Math.ceil(RACE_SECONDS - raceElapsed))}s`;
        feedText.textContent = `🐾 ${feed}`;
      }

      function updateRace(delta) {
        raceElapsed += delta;
        bladeAngle += delta * 7.2;

        const keyDirection = (keys.has("arrowright") || keys.has("d") ? 1 : 0) - (keys.has("arrowleft") || keys.has("a") ? 1 : 0);
        if (keyDirection) playerTargetX = clamp(playerTargetX + keyDirection * delta * 0.82, 0.09, 0.91);
        playerX = lerp(playerX, playerTargetX, clamp(delta * 9, 0, 1));

        const raceRatio = clamp(raceElapsed / RACE_SECONDS, 0, 1);
        playerProgress = clamp(raceRatio * 1.03, 0, 1);
        rivalProgress = clamp(raceRatio * (0.985 + Math.sin(raceElapsed * 0.45) * 0.008), 0, 1);
        rivalX = clamp(0.5 + Math.sin(raceElapsed * 1.05) * 0.2 + Math.sin(raceElapsed * 2.35) * 0.04, 0.22, 0.78);

        const playerCenter = mowerPoint(layout.playerLane, playerProgress, playerX);
        const rivalCenter = mowerPoint(layout.rivalLane, rivalProgress, rivalX);
        const normalized = normalizeBlade();
        cutLane(playerCells, layout.playerLane, playerCenter, normalized, bladeAngle, true);
        cutLane(rivalCells, layout.rivalLane, rivalCenter, rivalBlade, -bladeAngle * 0.88, false);
        playerScore = playerCells.filter((cell) => cell.cut).length / playerCells.length;
        rivalScore = rivalCells.filter((cell) => cell.cut).length / rivalCells.length;

        particles.forEach((particle) => {
          particle.life -= delta;
          particle.x += particle.vx * delta;
          particle.y += particle.vy * delta;
          particle.vy += 90 * delta;
        });
        particles = particles.filter((particle) => particle.life > 0);
        updateHud();

        if (raceElapsed >= RACE_SECONDS) finishRace();
      }

      function finishRace() {
        phase = "result";
        const playerPercent = Math.round(playerScore * 100);
        const rivalPercent = Math.round(rivalScore * 100);
        const difference = playerPercent - rivalPercent;
        const reward = difference > 0 ? 12 : difference === 0 ? 8 : 5;
        feed += reward;
        saveFeed();
        updateHud();

        if (difference > 0) {
          resultKicker.textContent = "You won the race";
          resultTitle.textContent = "Freshly Cut";
          petMessage.innerHTML = `<strong>🐶 Great run!</strong> You earned ${reward} bowls of pet food.`;
        } else if (difference === 0) {
          resultKicker.textContent = "Perfect tie";
          resultTitle.textContent = "Even Finish";
          petMessage.innerHTML = `<strong>🐰 Same score!</strong> You earned ${reward} bowls of pet food.`;
        } else {
          resultKicker.textContent = "Close race";
          resultTitle.textContent = "Try Another Line";
          petMessage.innerHTML = `<strong>🐱 Keep mowing!</strong> You still earned ${reward} bowls of pet food.`;
        }

        resultPlayer.textContent = `${playerPercent}%`;
        resultRival.textContent = `${rivalPercent}%`;
        resultOverlay.hidden = false;
        announcement.textContent = `Race complete. You cut ${playerPercent} percent and the rival cut ${rivalPercent} percent.`;
        againButton.focus({ preventScroll: true });
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#0b2b18");
        gradient.addColorStop(1, "#041108");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(200,255,85,.025)";
        for (let x = 0; x < width; x += 42) ctx.fillRect(x, 0, 1, height);
        for (let y = 0; y < height; y += 42) ctx.fillRect(0, y, width, 1);
      }

      function drawLane(lane, cells, accent) {
        ctx.save();
        roundedRect(ctx, lane.x, layout.top, lane.width, layout.laneHeight, 12);
        ctx.clip();
        ctx.fillStyle = "#1b6b37";
        ctx.fillRect(lane.x, layout.top, lane.width, layout.laneHeight);

        cells.forEach((cell) => {
          const position = lanePoint(cell, lane);
          const x = lane.x + cell.column * position.cellWidth;
          const y = layout.top + cell.row * position.cellHeight;
          if (cell.cut) {
            ctx.fillStyle = cell.shade % 2 ? "#174a29" : "#1b5530";
            ctx.fillRect(x, y, position.cellWidth + 0.5, position.cellHeight + 0.5);
            ctx.strokeStyle = "rgba(200,255,85,.12)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(position.x - 3, position.y + 2);
            ctx.lineTo(position.x + 4, position.y + 2);
            ctx.stroke();
          } else {
            const shades = ["#2d9c49", "#35a94f", "#259143", "#3db456"];
            ctx.fillStyle = shades[cell.shade];
            ctx.fillRect(x, y, position.cellWidth + 0.5, position.cellHeight + 0.5);
            if ((cell.column + cell.row) % 2 === 0) {
              ctx.strokeStyle = "rgba(220,255,170,.34)";
              ctx.lineWidth = 1.2;
              ctx.beginPath();
              ctx.moveTo(position.x, position.y + position.cellHeight * 0.28);
              ctx.lineTo(position.x - 2, position.y - position.cellHeight * 0.22);
              ctx.moveTo(position.x, position.y + position.cellHeight * 0.28);
              ctx.lineTo(position.x + 3, position.y - position.cellHeight * 0.14);
              ctx.stroke();
            }
          }
        });

        ctx.fillStyle = "rgba(255,255,255,.07)";
        for (let column = 0; column < COLS; column += 2) {
          ctx.fillRect(lane.x + column * lane.width / COLS, layout.top, lane.width / COLS, layout.laneHeight);
        }
        ctx.restore();

        ctx.strokeStyle = `${accent}88`;
        ctx.lineWidth = 2;
        roundedRect(ctx, lane.x, layout.top, lane.width, layout.laneHeight, 12);
        ctx.stroke();

        const checker = Math.max(7, lane.width / 28);
        for (let index = 0; index < Math.ceil(lane.width / checker); index += 1) {
          ctx.fillStyle = index % 2 ? "#f8ffe8" : "#07140c";
          ctx.fillRect(lane.x + index * checker, layout.top + 5, checker + 0.5, 7);
        }
      }

      function drawMower(center, lane, points, angle, accent, label) {
        const radius = label === "YOU"
          ? clamp(lane.width * 0.31, 32, 134)
          : clamp(lane.width * 0.13, 22, 58);
        const blade = transformedBlade(center, points, angle, radius);

        ctx.save();
        ctx.strokeStyle = accent;
        ctx.lineWidth = clamp(lane.width * 0.018, 4, 9);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.shadowColor = accent;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(blade[0].x, blade[0].y);
        for (let index = 1; index < blade.length; index += 1) ctx.lineTo(blade[index].x, blade[index].y);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.fillStyle = "rgba(0,0,0,.3)";
        ctx.beginPath();
        ctx.ellipse(0, 10, 21, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#06140c";
        roundedRect(ctx, -20, -16, 40, 30, 8);
        ctx.fill();
        ctx.fillStyle = accent;
        roundedRect(ctx, -15, -13, 30, 23, 6);
        ctx.fill();
        ctx.fillStyle = "#f8ffe8";
        ctx.beginPath();
        ctx.arc(0, -4, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#06140c";
        ctx.fillRect(-24, -10, 7, 18);
        ctx.fillRect(17, -10, 7, 18);
        ctx.restore();

        ctx.fillStyle = "rgba(5,19,11,.84)";
        roundedRect(ctx, center.x - 24, center.y + 20, 48, 18, 5);
        ctx.fill();
        ctx.fillStyle = accent;
        ctx.font = "900 9px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, center.x, center.y + 29);
      }

      function drawParticles() {
        particles.forEach((particle) => {
          ctx.globalAlpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.fillRect(particle.x - 2, particle.y - 4, 4, 8);
        });
        ctx.globalAlpha = 1;
      }

      function render() {
        if (!layout) return;
        drawBackground();
        drawLane(layout.playerLane, playerCells.length ? playerCells : makeCells(), "#c8ff55");
        drawLane(layout.rivalLane, rivalCells.length ? rivalCells : makeCells(), "#ffb84d");

        ctx.fillStyle = "rgba(248,255,232,.58)";
        ctx.font = `900 ${height < 420 ? 9 : 11}px Trebuchet MS`;
        ctx.textAlign = "center";
        ctx.fillText("YOUR LAWN", layout.playerLane.x + layout.playerLane.width / 2, layout.top + 26);
        ctx.fillText("RIVAL LAWN", layout.rivalLane.x + layout.rivalLane.width / 2, layout.top + 26);

        if (phase === "racing" || phase === "result") {
          const playerCenter = mowerPoint(layout.playerLane, playerProgress, playerX);
          const rivalCenter = mowerPoint(layout.rivalLane, rivalProgress, rivalX);
          drawMower(playerCenter, layout.playerLane, normalizeBlade(), bladeAngle, "#c8ff55", "YOU");
          drawMower(rivalCenter, layout.rivalLane, rivalBlade, -bladeAngle * 0.88, "#ffb84d", "RIVAL");
        }
        drawParticles();
      }

      function animationLoop(now) {
        const delta = Math.min((now - lastTime) / 1000, 0.04);
        lastTime = now;
        if (phase === "racing") updateRace(delta);
        render();
        requestAnimationFrame(animationLoop);
      }

      function setPlayerTarget(event) {
        if (!layout || phase !== "racing") return;
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        playerTargetX = clamp((x - layout.playerLane.x) / layout.playerLane.width, 0.09, 0.91);
      }

      pad.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        drawing = true;
        drawingPointer = event.pointerId;
        pad.setPointerCapture(event.pointerId);
        bladePoints = [padPoint(event)];
        startButton.disabled = true;
        drawBladeOnPad();
      });

      pad.addEventListener("pointermove", (event) => {
        if (!drawing || event.pointerId !== drawingPointer) return;
        event.preventDefault();
        const point = padPoint(event);
        const previous = bladePoints[bladePoints.length - 1];
        if (!previous || Math.hypot(point.x - previous.x, point.y - previous.y) >= 3) {
          bladePoints.push(point);
          drawBladeOnPad();
        }
      });

      const finishDrawing = (event) => {
        if (!drawing || event.pointerId !== drawingPointer) return;
        drawing = false;
        drawingPointer = null;
        startButton.disabled = bladePoints.length < 3;
      };

      pad.addEventListener("pointerup", finishDrawing);
      pad.addEventListener("pointercancel", finishDrawing);

      canvas.addEventListener("pointerdown", (event) => {
        if (phase !== "racing") return;
        pointerActive = true;
        activePointer = event.pointerId;
        canvas.setPointerCapture(event.pointerId);
        setPlayerTarget(event);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (pointerActive && event.pointerId === activePointer) setPlayerTarget(event);
      });

      const releasePointer = (event) => {
        if (event.pointerId !== activePointer) return;
        pointerActive = false;
        activePointer = null;
      };

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (["arrowleft", "arrowright", "a", "d"].includes(key)) {
          event.preventDefault();
          keys.add(key);
        }
        if ((event.key === " " || event.key === "Enter") && phase === "design" && !startButton.disabled) {
          event.preventDefault();
          startRace();
        }
      });

      window.addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
      window.addEventListener("blur", () => keys.clear());
      window.addEventListener("resize", resize, { passive: true });

      startButton.addEventListener("click", startRace);
      clearButton.addEventListener("click", () => {
        bladePoints = [];
        startButton.disabled = true;
        drawBladeOnPad();
      });
      againButton.addEventListener("click", startRace);
      newBladeButton.addEventListener("click", showDesigner);

      feedText.textContent = `🐾 ${feed}`;
      playerCells = makeCells();
      rivalCells = makeCells();
      seedBlade();
      resize();
      requestAnimationFrame(animationLoop);
    })();
  </script>
</body>
</html>
